<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <title>Centered Icon and Text Button</title>
    <style>
      /* Button styles */
      .button-centered-icon-text {
        --button-color: #fff;
        --button-background: #3223b3;
        --button-background-hover: #281c8f;

        display: flex;
        box-sizing: border-box;
        gap: 8px;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: 320px;
        height: 64px;
        padding: 8px 16px 8px 8px;
        font-size: 1rem;
        color: var(--button-color);
        text-align: center;
        text-decoration: none;
        background-color: var(--button-background);
        border-radius: 32px;

        &.is-reverse {
          flex-direction: row-reverse;
          padding: 8px 8px 8px 16px;
        }

        .icon-wrap {
          display: flex;
          align-items: center;
          justify-content: center;
          width: 40px;
          aspect-ratio: 1;
          overflow: hidden;

          svg {
            display: block;
            width: 2rem;
            aspect-ratio: 1;

            & * {
              fill: none;
              stroke: currentcolor;
              stroke-width: 1.5;
              stroke-linecap: round;
              stroke-linejoin: round;
            }
          }
        }

        @media (any-hover: hover) {
          transition: background-color 0.2s;

          &:hover {
            background-color: var(--button-background-hover);
          }
        }
      }
    </style>
  </head>
  <body class="demo-page">
    <!-- Button HTML -->
    <a href="#" class="button-centered-icon-text">
      <span class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <rect x="3.5" y="5.5" width="17" height="12" rx="1.5" />
          <path d="M6 9C6 9 11.5 12 12 12C12.5 12 18 9 18 9" />
        </svg>
      </span>
      <span class="label">Contact</span>
    </a>
    <a href="#" class="button-centered-icon-text is-reverse">
      <span class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <rect x="3.5" y="5.5" width="17" height="12" rx="1.5" />
          <path d="M6 9C6 9 11.5 12 12 12C12.5 12 18 9 18 9" />
        </svg>
      </span>
      <span class="label">Contact</span>
    </a>
  </body>
</html>
