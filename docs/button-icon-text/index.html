<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>アイコンとテキストが横並ぶボタン</title>
    <style>
      /* デモ用のスタイル */
      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        display: grid;
        grid-template-columns: 1fr;
        row-gap: 16px;
        place-content: center;
        place-items: center;
        height: 100%;
        padding: 64px 16px;
        margin: 0;
        font-family: sans-serif;
        font-size: 1rem;
        color: #222;
        background-color: #efefef;
      }

      a {
        color: inherit;
        text-decoration: none;
      }
    </style>

    <style>
      /* ボタン本体のスタイル */
      .buttonIconText {
        --button-height: 64px;
        --button-radius: calc(var(--button-height) / 2);
        --button-bg: #6fa24a;
        --button-bg-hover: #54802f;
        --button-color: #fff;

        display: flex;
        gap: 8px;
        align-items: center;
        width: 100%;
        max-width: 320px;
        height: var(--button-height);
        padding: 8px 40px 8px 8px;
        overflow-wrap: anywhere;
        font-family: sans-serif;
        font-size: 1rem;
        color: var(--button-color);
        text-align: center;
        background-color: var(--button-bg);
        border-radius: var(--button-radius);

        &.buttonIconText__reverse {
          flex-direction: row-reverse;
          padding: 8px 8px 8px 40px;
        }

        .buttonIconText_icon {
          display: flex;
          flex-shrink: 0;
          align-items: center;
          justify-content: center;
          width: 48px;
          aspect-ratio: 1;
          padding: 4px;
          overflow: hidden;
          background-color: #fff;
          border-radius: 50%;
        }

        .buttonIconText_text {
          flex-shrink: 1;
          width: 100%;
        }

        @media (any-hover: hover) {
          transition: background-color 0.2s;

          &:hover {
            background-color: var(--button-bg-hover);
          }
        }
      }

      .iconArrowTop {
        rotate: 270deg;
      }

      .iconArrowBottom {
        rotate: 90deg;
      }

      .iconArrowLeft {
        rotate: 180deg;
      }
    </style>
  </head>
  <body>
    <!-- ボタン本体のHTML -->
    <a href="#" class="buttonIconText">
      <span class="buttonIconText_icon">
        <svg
          class="iconEmail"
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect
            x="3.5"
            y="5.5"
            width="17"
            height="12"
            rx="1.5"
            stroke="#6fa24a"
          />
          <path
            d="M6 9C6 9 11.5 12 12 12C12.5 12 18 9 18 9"
            stroke="#6fa24a"
            stroke-linecap="round"
          />
        </svg>
      </span>
      <span class="buttonIconText_text">お問い合わせ</span>
    </a>
    <a href="#" class="buttonIconText buttonIconText__reverse">
      <span class="buttonIconText_icon">
        <svg
          class="iconEmail"
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect
            x="3.5"
            y="5.5"
            width="17"
            height="12"
            rx="1.5"
            stroke="#6fa24a"
          />
          <path
            d="M6 9C6 9 11.5 12 12 12C12.5 12 18 9 18 9"
            stroke="#6fa24a"
            stroke-linecap="round"
          />
        </svg>
      </span>
      <span class="buttonIconText_text">お問い合わせ</span>
    </a>
  </body>
</html>
