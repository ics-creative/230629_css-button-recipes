<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>円形ボタン（アイコンのみ）</title>
    <style>
      /* デモ用のスタイル */
      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        display: grid;
        grid-template-columns: 1fr;
        row-gap: 16px;
        place-content: center;
        place-items: center;
        height: 100%;
        padding: 64px 16px;
        margin: 0;
        font-family: sans-serif;
        font-size: 1rem;
        color: #222;
        background-color: #efefef;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .buttonList {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: center;
        justify-content: center;
        width: 100%;
      }
    </style>

    <style>
      /* ボタン本体のスタイル */
      .buttonIcon {
        --button-size: 80px;
        --button-bg: #6fa24a;
        --button-bg-hover: #54802f;

        display: flex;
        align-items: center;
        justify-content: center;
        width: var(--button-size);
        aspect-ratio: 1;
        background-color: var(--button-bg);
        border-radius: 50%;

        @media (any-hover: hover) {
          transition: background-color 0.2s;

          &:hover {
            background-color: var(--button-bg-hover);
          }
        }
      }

      .iconArrowBottom {
        rotate: 90deg;
      }

      .iconArrowLeft {
        rotate: 180deg;
      }

      .iconArrowTop {
        rotate: 270deg;
      }
    </style>
  </head>
  <body>
    <!-- デモ用のHTML -->
    <div class="buttonList">
      <!-- ボタン本体のHTML -->
      <a href="#" class="buttonIcon" aria-label="お問い合わせ">
        <svg
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect
            x="3.5"
            y="5.5"
            width="17"
            height="12"
            rx="1.5"
            stroke="#ffffff"
          />
          <path
            d="M6 9C6 9 11.5 12 12 12C12.5 12 18 9 18 9"
            stroke="#ffffff"
            stroke-linecap="round"
          />
        </svg>
      </a>
      <a href="#" class="buttonIcon" aria-label="ページ上部へ戻る">
        <svg
          class="iconArrowTop"
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M10 6L15.2929 11.2929C15.6834 11.6834 15.6834 12.3166 15.2929 12.7071L10 18"
            stroke="#ffffff"
            stroke-linecap="round"
          />
        </svg>
      </a>
      <a href="#" class="buttonIcon" aria-label="詳しく見る">
        <svg
          class="iconArrowRight"
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M10 6L15.2929 11.2929C15.6834 11.6834 15.6834 12.3166 15.2929 12.7071L10 18"
            stroke="#ffffff"
            stroke-linecap="round"
          />
        </svg>
      </a>
      <a href="#" class="buttonIcon" aria-label="コンテンツへ移動します">
        <svg
          class="iconArrowBottom"
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M10 6L15.2929 11.2929C15.6834 11.6834 15.6834 12.3166 15.2929 12.7071L10 18"
            stroke="#ffffff"
            stroke-linecap="round"
          />
        </svg>
      </a>
      <a href="#" class="buttonIcon" aria-label="戻る">
        <svg
          class="iconArrowLeft"
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M10 6L15.2929 11.2929C15.6834 11.6834 15.6834 12.3166 15.2929 12.7071L10 18"
            stroke="#ffffff"
            stroke-linecap="round"
          />
        </svg>
      </a>
    </div>
  </body>
</html>
