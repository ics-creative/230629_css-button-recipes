<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>アウトラインのボタン（枠線をグラデーションで再現する）</title>
    <style>
      /* デモ用のスタイル */
      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        display: grid;
        grid-template-columns: 1fr;
        row-gap: 16px;
        place-content: center;
        place-items: center;
        height: 100%;
        padding: 64px 16px;
        margin: 0;
        font-family: sans-serif;
        font-size: 1rem;
        color: #222;
        background-color: #222;
      }

      a {
        color: inherit;
        text-decoration: none;
      }
    </style>

    <style>
      /* ボタン本体のスタイル */
      .buttonOutlineGradient {
        --button-height: 64px;
        --button-radius: calc(var(--button-height) / 2);
        --button-color: #fff;
        --button-surface: #222;
        --button-outline: linear-gradient(135deg, #6fa24a, #15a1cc);

        position: relative;
        display: block;
        width: 100%;
        max-width: 320px;
        height: var(--button-height);
        padding: 2px;
        overflow-wrap: anywhere;
        font-family: sans-serif;
        font-size: 1rem;
        text-align: center;
        background: var(--button-outline);
        border-radius: var(--button-radius);

        &::before {
          position: absolute;
          inset: 0;
          content: "";
          background: var(--button-outline);
          border-radius: inherit;
          opacity: 0;
          filter: blur(8px);
        }

        .buttonOutlineGradient_item {
          position: relative;
          display: flex;
          align-items: center;
          justify-content: center;
          width: 100%;
          height: 100%;
          color: var(--button-color);
          background-color: var(--button-surface);
          border-radius: inherit;
        }

        @media (any-hover: hover) {
          &::before {
            transition: opacity 0.2s;
          }

          &:hover::before {
            opacity: 1;
          }
        }
      }
    </style>
  </head>
  <body class="dark">
    <!-- ボタン本体のHTML -->
    <a href="#" class="buttonOutlineGradient">
      <span class="buttonOutlineGradient_item">テキスト</span>
    </a>
  </body>
</html>
