<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../common.css" />
    <title>Outline Button</title>
    <style>
      /* Button styles */
      .buttonOutline {
        display: grid;
        box-sizing: border-box;
        place-items: center;
        width: 100%;
        max-width: 320px;
        height: 64px;
        padding-inline: 24px;
        color: #6fa24a;
        text-decoration: none;
        border: 2px solid currentcolor;

        @media (any-hover: hover) {
          transition: background-color 0.2s;

          &:hover {
            background-color: #dcedd2;
          }
        }
      }
    </style>
  </head>
  <body class="demoPage">
    <!-- Button HTML -->
    <a href="#" class="buttonOutline">Text</a>
  </body>
</html>
