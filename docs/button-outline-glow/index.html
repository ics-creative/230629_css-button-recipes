<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>アウトラインのボタン（ホバー時に光沢の演出を行う）</title>
    <style>
      /* デモ用のスタイル */
      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        display: grid;
        grid-template-columns: 1fr;
        row-gap: 16px;
        place-content: center;
        place-items: center;
        height: 100%;
        padding: 64px 16px;
        margin: 0;
        font-family: sans-serif;
        font-size: 1rem;
        color: #222;
        background-color: #222;
      }

      a {
        color: inherit;
        text-decoration: none;
      }
    </style>

    <style>
      /* ボタン本体のスタイル */
      @property --angle {
        syntax: "<angle>";
        inherits: false;
        initial-value: 0deg;
      }

      .buttonOutlineGlow {
        --button-height: 64px;
        --button-radius: calc(var(--button-height) / 2);
        --button-color: #fff;
        --button-surface: #222;
        --button-outline: #939393;

        position: relative;
        display: block;
        width: 100%;
        max-width: 320px;
        height: var(--button-height);
        padding: 2px;
        overflow-wrap: anywhere;
        font-family: sans-serif;
        font-size: 1rem;
        color: var(--button-color);
        text-align: center;
        background-color: var(--button-outline);
        border-radius: var(--button-radius);

        .buttonOutlineGlow_bg {
          position: absolute;
          inset: 0;
          background: conic-gradient(
            from var(--angle),
            var(--button-surface),
            var(--button-outline),
            var(--button-surface),
            var(--button-outline),
            var(--button-surface)
          );
          border-radius: inherit;
          opacity: 0;
          animation: gradient-spin 3s linear infinite;
        }

        .buttonOutlineGlow_item {
          position: relative;
          display: flex;
          align-items: center;
          justify-content: center;
          width: 100%;
          height: 100%;
          background-color: var(--button-surface);
          border-radius: inherit;
        }

        @media (any-hover: hover) {
          .buttonOutlineGlow_bg {
            transition: opacity 0.3s;
          }

          &:hover .buttonOutlineGlow_bg {
            opacity: 1;
          }
        }
      }

      @keyframes gradient-spin {
        from {
          --angle: 0deg;
        }

        to {
          --angle: 360deg;
        }
      }
    </style>
  </head>
  <body class="dark">
    <!-- ボタン本体のHTML -->
    <a href="#" class="buttonOutlineGlow">
      <span class="buttonOutlineGlow_bg"></span>
      <span class="buttonOutlineGlow_item">テキスト</span>
    </a>
  </body>
</html>
