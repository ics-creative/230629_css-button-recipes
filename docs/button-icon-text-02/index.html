<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../common.css" />
    <title>Icon and Text Button with Arrow</title>
    <style>
      /* Button styles */
      .buttonIconText02 {
        display: flex;
        box-sizing: border-box;
        gap: 8px;
        align-items: center;
        width: 100%;
        max-width: 320px;
        min-height: 64px;
        padding-inline: 8px 64px;
        color: #fff;
        text-decoration: none;
        background-color: #6fa24a;
        border-radius: 9999px;

        &.is-reverse {
          flex-direction: row-reverse;
          padding-inline: 64px 8px;
        }

        ._icon {
          display: grid;
          flex: none;
          place-items: center;
          width: 48px;
          aspect-ratio: 1;
          overflow: hidden;

          svg {
            display: block;
            width: 2rem;
            aspect-ratio: 1;

            & * {
              fill: none;
              stroke: currentcolor;
              stroke-width: 1.5;
              stroke-linecap: round;
              stroke-linejoin: round;
            }
          }

          &.is-left svg {
            rotate: 180deg;
          }
        }

        ._text {
          flex: 1;
          text-align: center;
        }

        @media (any-hover: hover) {
          transition: background-color 0.2s;

          ._icon {
            transition: transform 0.2s;
          }

          &:hover {
            background-color: #54802f;

            ._icon {
              transform: translateX(4px);

              &.is-left {
                transform: translateX(-4px);
              }
            }
          }
        }
      }
    </style>
  </head>
  <body class="demoPage">
    <!-- Button HTML -->
    <a href="#" class="buttonIconText02 is-reverse">
      <span class="_icon">
        <svg viewBox="0 0 24 24">
          <path
            d="M10 6L15.2929 11.2929C15.6834 11.6834 15.6834 12.3166 15.2929 12.7071L10 18"
          />
        </svg>
      </span>
      <span class="_text">Learn more</span>
    </a>
    <a href="#" class="buttonIconText02">
      <span class="_icon is-left">
        <svg viewBox="0 0 24 24">
          <path
            d="M10 6L15.2929 11.2929C15.6834 11.6834 15.6834 12.3166 15.2929 12.7071L10 18"
          />
        </svg>
      </span>
      <span class="_text">Back</span>
    </a>
  </body>
</html>
