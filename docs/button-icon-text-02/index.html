<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>アイコンとテキストが横並ぶボタン（矢印のアイコン）</title>
    <style>
      /* デモ用のスタイル */
      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        display: grid;
        grid-template-columns: 1fr;
        row-gap: 16px;
        place-content: center;
        place-items: center;
        height: 100%;
        padding: 64px 16px;
        margin: 0;
        font-family: sans-serif;
        font-size: 1rem;
        color: #222;
        background-color: #efefef;
      }

      a {
        color: inherit;
        text-decoration: none;
      }
    </style>

    <style>
      /* ボタン本体のスタイル */
      .buttonIconText02 {
        --button-height: 64px;
        --button-radius: calc(var(--button-height) / 2);
        --button-bg: #6fa24a;
        --button-bg-hover: #54802f;
        --button-color: #fff;

        display: flex;
        gap: 8px;
        align-items: center;
        width: 100%;
        max-width: 320px;
        height: var(--button-height);
        padding: 8px 64px 8px 8px;
        overflow-wrap: anywhere;
        font-family: sans-serif;
        font-size: 1rem;
        color: var(--button-color);
        text-align: center;
        background-color: var(--button-bg);
        border-radius: var(--button-radius);

        &.buttonIconText02__reverse {
          flex-direction: row-reverse;
          padding: 8px 8px 8px 64px;
        }

        .buttonIconText02_icon {
          display: flex;
          flex-shrink: 0;
          align-items: center;
          justify-content: center;
          width: 48px;
          aspect-ratio: 1;
          overflow: hidden;
        }

        .buttonIconText02_text {
          flex-shrink: 1;
          width: 100%;
        }

        @media (any-hover: hover) {
          transition: background-color 0.2s;

          .buttonIconText02_icon {
            transition: transform 0.2s;
          }

          &:hover {
            background-color: var(--button-bg-hover);

            .buttonIconText02_icon {
              transform: translateX(4px);

              &.buttonIconText02_icon__left {
                transform: translateX(-4px);
              }
            }
          }
        }
      }

      .iconArrowLeft {
        rotate: 180deg;
      }
    </style>
  </head>
  <body>
    <!-- ボタン本体のHTML -->
    <a href="#" class="buttonIconText02 buttonIconText02__reverse">
      <span class="buttonIconText02_icon">
        <svg
          class="iconArrowRight"
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M10 6L15.2929 11.2929C15.6834 11.6834 15.6834 12.3166 15.2929 12.7071L10 18"
            stroke="#ffffff"
            stroke-linecap="round"
          />
        </svg>
      </span>
      <span class="buttonIconText02_text">詳しく見る</span>
    </a>
    <a href="#" class="buttonIconText02">
      <span class="buttonIconText02_icon buttonIconText02_icon__left">
        <svg
          class="iconArrowLeft"
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M10 6L15.2929 11.2929C15.6834 11.6834 15.6834 12.3166 15.2929 12.7071L10 18"
            stroke="#ffffff"
            stroke-linecap="round"
          />
        </svg>
      </span>
      <span class="buttonIconText02_text">戻る</span>
    </a>
  </body>
</html>
