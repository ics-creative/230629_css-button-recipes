<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <title>Icon and Text Button</title>
    <style>
      /* Button styles */
      .icon-badge-button {
        display: flex;
        box-sizing: border-box;
        gap: 8px;
        align-items: center;
        width: 100%;
        max-width: 320px;
        height: 64px;
        padding-inline: 8px 40px;
        color: #fff;
        text-decoration: none;
        background-color: #6fa24a;
        border-radius: 9999px;

        &.is-reverse {
          flex-direction: row-reverse;
          padding-inline: 40px 8px;
        }

        .icon-box {
          display: grid;
          flex: none;
          place-items: center;
          width: 48px;
          aspect-ratio: 1;
          padding: 4px;
          overflow: hidden;
          color: #6fa24a;
          background-color: #fff;
          border-radius: 50%;

          svg {
            display: block;
            width: 2rem;
            aspect-ratio: 1;

            & * {
              fill: none;
              stroke: currentcolor;
              stroke-width: 1.5;
              stroke-linecap: round;
              stroke-linejoin: round;
            }
          }
        }

        .label {
          flex: 1;
          text-align: center;
        }

        @media (any-hover: hover) {
          transition: background-color 0.2s;

          &:hover {
            background-color: #54802f;
          }
        }
      }
    </style>
  </head>
  <body class="demo-page">
    <!-- Button HTML -->
    <a href="#" class="icon-badge-button">
      <span class="icon-box">
        <svg viewBox="0 0 24 24">
          <rect x="3.5" y="5.5" width="17" height="12" rx="1.5" />
          <path d="M6 9C6 9 11.5 12 12 12C12.5 12 18 9 18 9" />
        </svg>
      </span>
      <span class="label">Contact</span>
    </a>
    <a href="#" class="icon-badge-button is-reverse">
      <span class="icon-box">
        <svg viewBox="0 0 24 24">
          <rect x="3.5" y="5.5" width="17" height="12" rx="1.5" />
          <path d="M6 9C6 9 11.5 12 12 12C12.5 12 18 9 18 9" />
        </svg>
      </span>
      <span class="label">Contact</span>
    </a>
  </body>
</html>
