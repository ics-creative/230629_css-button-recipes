<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <title>Text Button with Sliding Underline</title>
    <style>
      /* Demo styles */
      ul,
      li {
        padding: 0;
        margin: 0;
        list-style: none;
      }

      .nav-list {
        display: flex;
        padding: 0 16px;
        background-color: #fff;
        box-shadow: 0 0 4px rgb(0 0 0 / 30%);
      }
    </style>

    <style>
      /* Button styles */
      .underline-link {
        position: relative;
        display: grid;
        place-items: center;
        height: 64px;
        padding: 0 24px;
        color: #222;
        text-decoration: none;

        &::after {
          position: absolute;
          right: 0;
          bottom: 0;
          left: 0;
          height: 2px;
          content: "";
          background-color: #6fa24a;
          transform: scaleX(0);
          transform-origin: right top;
        }

        @media (any-hover: hover) {
          &::after {
            transition: transform 0.2s cubic-bezier(0.19, 1, 0.22, 1);
          }

          &:hover::after {
            transform: scaleX(1);
            transform-origin: left top;
            transition: transform 0.4s cubic-bezier(0.9, 0, 0, 1);
          }
        }
      }
    </style>
  </head>
  <body class="demo-page">
    <!-- Demo HTML -->
    <nav>
      <ul class="nav-list">
        <li>
          <!-- Button HTML -->
          <a href="#" class="underline-link">Home</a>
        </li>
        <li>
          <a href="#" class="underline-link">About</a>
        </li>
        <li>
          <a href="#" class="underline-link">News</a>
        </li>
      </ul>
    </nav>
  </body>
</html>
