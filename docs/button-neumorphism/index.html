<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../common.css" />
    <title>Neumorphic Button</title>
    <style>
      /* Button styles */
      .buttonNeumorphism {
        display: grid;
        place-items: center;
        width: 80px;
        aspect-ratio: 1;
        color: #222;
        text-decoration: none;
        background-color: #efefef;
        border-radius: 50%;
        box-shadow:
          -4px -4px 8px #fff,
          4px 4px 8px rgb(0 0 0 / 24%);

        svg {
          display: block;
          width: 2rem;
          aspect-ratio: 1;

          & * {
            fill: none;
            stroke: currentcolor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
          }
        }

        @media (any-hover: hover) {
          transition: box-shadow 0.2s;

          &:hover {
            box-shadow:
              -2px -2px 4px #fff,
              2px 2px 4px rgb(0 0 0 / 24%);
          }

          &:active {
            background-color: #ebebeb;
            box-shadow: inset 4px 4px 8px rgb(0 0 0 / 16%);
          }
        }
      }
    </style>
  </head>
  <body class="demoPage">
    <!-- Button HTML -->
    <a href="#" class="buttonNeumorphism">
      <svg viewBox="0 0 24 24">
        <rect x="3.5" y="5.5" width="17" height="12" rx="1.5" />
        <path d="M6 9C6 9 11.5 12 12 12C12.5 12 18 9 18 9" />
      </svg>
    </a>
  </body>
</html>
