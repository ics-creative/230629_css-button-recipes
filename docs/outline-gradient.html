<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <title>Gradient Outline Button</title>
    <style>
      /* Button styles */
      .button-outline-gradient {
        --outline: linear-gradient(
          135deg,
          var(--color-accent),
          color-mix(in oklab, var(--color-accent) 60%, #fff)
        );

        position: relative;
        display: block;
        box-sizing: border-box;
        width: 100%;
        max-width: 320px;
        height: 64px;
        padding: 2px;
        font-size: 1rem;
        text-align: center;
        background: var(--outline);
        border-radius: 32px;
        text-decoration: none;

        &::before {
          position: absolute;
          top: 0;
          left: 0;
          display: block;
          width: 100%;
          height: 100%;
          content: "";
          background: var(--outline);
          border-radius: inherit;
          opacity: 0;
          filter: blur(8px);
        }

        .button-body {
          position: relative;
          display: flex;
          box-sizing: border-box;
          align-items: center;
          justify-content: center;
          width: 100%;
          height: 100%;
          color: var(--color-accent-contrast);
          background-color: var(--color-text);
          border-radius: inherit;
        }

        @media (any-hover: hover) {
          &::before {
            transition: opacity 0.2s;
          }

          &:hover::before {
            opacity: 1;
          }
        }
      }
    </style>
  </head>
  <body class="demo-page dark-page">
    <!-- Button HTML -->
    <a href="#" class="button-outline-gradient">
      <span class="button-body">Text</span>
    </a>
  </body>
</html>
