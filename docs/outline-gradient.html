<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <title>Gradient Outline Button</title>
    <style>
      /* Button styles */
      .gradient-outline-button {
        --outline: linear-gradient(135deg, #6fa24a, #15a1cc);

        position: relative;
        display: block;
        box-sizing: border-box;
        width: 100%;
        max-width: 320px;
        height: 64px;
        padding: 2px;
        background: var(--outline);
        border-radius: 9999px;
        text-decoration: none;

        &::before {
          position: absolute;
          inset: 0;
          content: "";
          background: var(--outline);
          border-radius: inherit;
          opacity: 0;
          filter: blur(8px);
        }

        .button-body {
          position: relative;
          display: grid;
          place-items: center;
          height: 100%;
          color: #fff;
          background-color: #222;
          border-radius: inherit;
        }

        @media (any-hover: hover) {
          &::before {
            transition: opacity 0.2s;
          }

          &:hover::before {
            opacity: 1;
          }
        }
      }
    </style>
  </head>
  <body class="demo-page dark-page">
    <!-- Button HTML -->
    <a href="#" class="gradient-outline-button">
      <span class="button-body">Text</span>
    </a>
  </body>
</html>
