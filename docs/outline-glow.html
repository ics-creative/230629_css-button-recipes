<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <title>Glowing Outline Button</title>
    <style>
      /* Button styles */
      @property --angle {
        syntax: "<angle>";
        inherits: false;
        initial-value: 0deg;
      }

      .button-outline-glow {
        --surface: var(--color-text);
        --outline: color-mix(in oklab, var(--color-accent) 45%, var(--color-line));

        position: relative;
        display: block;
        box-sizing: border-box;
        width: 100%;
        max-width: 320px;
        height: 64px;
        padding: 2px;
        font-size: 1rem;
        color: var(--color-accent-contrast);
        text-align: center;
        background-color: var(--outline);
        border-radius: 32px;
        text-decoration: none;

        .button-glow {
          position: absolute;
          top: 0;
          left: 0;
          display: block;
          width: 100%;
          height: 100%;
          background: conic-gradient(
            from var(--angle),
            var(--surface),
            var(--outline),
            var(--surface),
            var(--outline),
            var(--surface)
          );
          border-radius: inherit;
          opacity: 0;
          animation: gradient-spin 3s linear infinite;
        }

        .button-body {
          position: relative;
          display: flex;
          box-sizing: border-box;
          align-items: center;
          justify-content: center;
          width: 100%;
          height: 100%;
          background-color: var(--surface);
          border-radius: inherit;
        }

        @media (any-hover: hover) {
          .button-glow {
            transition: opacity 0.3s;
          }

          &:hover {
            background-color: var(--outline);
          }

          &:hover .button-glow {
            opacity: 1;
          }
        }
      }

      @keyframes gradient-spin {
        from {
          --angle: 0deg;
        }

        to {
          --angle: 360deg;
        }
      }
    </style>
  </head>
  <body class="demo-page dark-page">
    <!-- Button HTML -->
    <a href="#" class="button-outline-glow">
      <span class="button-glow"></span>
      <span class="button-body">Text</span>
    </a>
  </body>
</html>
