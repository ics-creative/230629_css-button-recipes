<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <title>Glowing Outline Button</title>
    <style>
      /* Button styles */
      @property --angle {
        syntax: "<angle>";
        inherits: false;
        initial-value: 0deg;
      }

      .glow-outline-button {
        --surface: #222;
        --outline: #939393;

        position: relative;
        display: block;
        box-sizing: border-box;
        width: 100%;
        max-width: 320px;
        height: 64px;
        padding: 2px;
        color: #fff;
        background-color: var(--outline);
        border-radius: 9999px;
        text-decoration: none;

        .button-glow {
          position: absolute;
          inset: 0;
          background: conic-gradient(
            from var(--angle),
            var(--surface),
            var(--outline),
            var(--surface),
            var(--outline),
            var(--surface)
          );
          border-radius: inherit;
          opacity: 0;
          animation: gradient-spin 3s linear infinite;
        }

        .button-body {
          position: relative;
          display: grid;
          place-items: center;
          height: 100%;
          background-color: var(--surface);
          border-radius: inherit;
        }

        @media (any-hover: hover) {
          .button-glow {
            transition: opacity 0.3s;
          }

          &:hover .button-glow {
            opacity: 1;
          }
        }
      }

      @keyframes gradient-spin {
        from {
          --angle: 0deg;
        }

        to {
          --angle: 360deg;
        }
      }
    </style>
  </head>
  <body class="demo-page dark-page">
    <!-- Button HTML -->
    <a href="#" class="glow-outline-button">
      <span class="button-glow"></span>
      <span class="button-body">Text</span>
    </a>
  </body>
</html>
