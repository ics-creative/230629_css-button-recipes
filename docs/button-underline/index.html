<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>テキストのボタン（ホバー時に下線部をスライドイン）</title>
    <style>
      /* デモ用のスタイル */
      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        display: grid;
        grid-template-columns: 1fr;
        row-gap: 16px;
        place-content: center;
        place-items: center;
        height: 100%;
        padding: 64px 16px;
        margin: 0;
        font-family: sans-serif;
        font-size: 1rem;
        color: #222;
        background-color: #efefef;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      ul,
      li {
        padding: 0;
        margin: 0;
        list-style: none;
      }

      .menu {
        display: flex;
        padding: 0 16px;
        background-color: #fff;
        box-shadow: 0 0 4px rgb(0 0 0 / 30%);
      }
    </style>

    <style>
      /* ボタン本体のスタイル */
      .buttonUnderline {
        --button-height: 64px;
        --button-color: #222;
        --button-line-color: #6fa24a;

        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        height: var(--button-height);
        padding: 0 24px;
        overflow: hidden;
        overflow-wrap: anywhere;
        font-size: 0.9375rem;
        color: var(--button-color);
        text-align: center;
        background: transparent;

        &::after {
          position: absolute;
          right: 0;
          bottom: 0;
          left: 0;
          height: 2px;
          content: "";
          background-color: var(--button-line-color);
          transform: scaleX(0);
          transform-origin: right top;
        }

        @media (any-hover: hover) {
          &::after {
            transition: transform 0.2s cubic-bezier(0.19, 1, 0.22, 1);
          }

          &:hover::after {
            transform: scaleX(1);
            transform-origin: left top;
            transition: transform 0.4s cubic-bezier(0.9, 0, 0, 1);
          }
        }
      }
    </style>
  </head>
  <body>
    <!-- デモ用のHTML -->
    <nav>
      <ul class="menu">
        <li>
          <!-- ボタン本体のHTML -->
          <a href="#" class="buttonUnderline">Home</a>
        </li>
        <li>
          <a href="#" class="buttonUnderline">About</a>
        </li>
        <li>
          <a href="#" class="buttonUnderline">News</a>
        </li>
      </ul>
    </nav>
  </body>
</html>
