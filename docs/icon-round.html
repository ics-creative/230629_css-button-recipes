<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./common.css" />
    <title>Icon-only Round Button</title>
    <style>
      /* Demo styles */
      .icon-button-list {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: center;
        justify-content: center;
        width: 100%;
      }
    </style>

    <style>
      /* Button styles */
      .button-icon-round {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 80px;
        aspect-ratio: 1;
        color: var(--color-accent-contrast);
        text-decoration: none;
        background-color: var(--color-accent);
        border-radius: 50%;

        svg {
          display: block;
          width: 2rem;
          aspect-ratio: 1;

          & * {
            fill: none;
            stroke: currentcolor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
          }

          &.is-bottom {
            rotate: 90deg;
          }

          &.is-left {
            rotate: 180deg;
          }

          &.is-top {
            rotate: 270deg;
          }
        }

        @media (any-hover: hover) {
          transition: background-color 0.2s;

          &:hover {
            background-color: var(--color-accent-hover);
          }
        }
      }
    </style>
  </head>
  <body class="demo-page">
    <!-- Demo HTML -->
    <div class="icon-button-list">
      <!-- Button HTML -->
      <a href="#" class="button-icon-round" aria-label="Contact">
        <svg viewBox="0 0 24 24">
          <rect x="3.5" y="5.5" width="17" height="12" rx="1.5" />
          <path d="M6 9C6 9 11.5 12 12 12C12.5 12 18 9 18 9" />
        </svg>
      </a>
      <a href="#" class="button-icon-round" aria-label="Back to top">
        <svg class="is-top" viewBox="0 0 24 24">
          <path d="M10 6L15.2929 11.2929C15.6834 11.6834 15.6834 12.3166 15.2929 12.7071L10 18" />
        </svg>
      </a>
      <a href="#" class="button-icon-round" aria-label="Learn more">
        <svg viewBox="0 0 24 24">
          <path d="M10 6L15.2929 11.2929C15.6834 11.6834 15.6834 12.3166 15.2929 12.7071L10 18" />
        </svg>
      </a>
      <a href="#" class="button-icon-round" aria-label="Jump to content">
        <svg class="is-bottom" viewBox="0 0 24 24">
          <path d="M10 6L15.2929 11.2929C15.6834 11.6834 15.6834 12.3166 15.2929 12.7071L10 18" />
        </svg>
      </a>
      <a href="#" class="button-icon-round" aria-label="Back">
        <svg class="is-left" viewBox="0 0 24 24">
          <path d="M10 6L15.2929 11.2929C15.6834 11.6834 15.6834 12.3166 15.2929 12.7071L10 18" />
        </svg>
      </a>
    </div>
  </body>
</html>
