<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../common.css" />
    <title>Centered Icon and Text Button</title>
    <style>
      /* Button styles */
      .buttonIconText03 {
        display: flex;
        box-sizing: border-box;
        gap: 8px;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: 320px;
        padding-inline: 8px 16px;
        color: #fff;
        text-decoration: none;
        background-color: #6fa24a;
        border-radius: 9999px;

        &.is-reverse {
          flex-direction: row-reverse;
          padding-inline: 16px 8px;
        }

        ._icon {
          display: grid;
          place-items: center;
          width: 40px;
          aspect-ratio: 1;
          overflow: hidden;

          svg {
            display: block;
            width: 2rem;
            aspect-ratio: 1;

            & * {
              fill: none;
              stroke: currentcolor;
              stroke-width: 1.5;
              stroke-linecap: round;
              stroke-linejoin: round;
            }
          }
        }

        @media (any-hover: hover) {
          transition: background-color 0.2s;

          &:hover {
            background-color: #54802f;
          }
        }
      }
    </style>
  </head>
  <body class="demoPage">
    <!-- Button HTML -->
    <a href="#" class="buttonIconText03">
      <span class="_icon">
        <svg viewBox="0 0 24 24">
          <rect x="3.5" y="5.5" width="17" height="12" rx="1.5" />
          <path d="M6 9C6 9 11.5 12 12 12C12.5 12 18 9 18 9" />
        </svg>
      </span>
      <span class="_text">Contact</span>
    </a>
    <a href="#" class="buttonIconText03 is-reverse">
      <span class="_icon">
        <svg viewBox="0 0 24 24">
          <rect x="3.5" y="5.5" width="17" height="12" rx="1.5" />
          <path d="M6 9C6 9 11.5 12 12 12C12.5 12 18 9 18 9" />
        </svg>
      </span>
      <span class="_text">Contact</span>
    </a>
  </body>
</html>
